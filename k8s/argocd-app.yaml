apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dormwatch-front
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/NULP-AI-Enterprise/dormwatch-front-end-v2.git
    targetRevision: main
    path: k8s/
  destination:
    server: https://kubernetes.default.svc
    namespace: dormwatch-front
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: bitnami.com
      kind: SealedSecret
      jsonPointers:
        - /spec/encryptedData
