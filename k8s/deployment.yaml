apiVersion: apps/v1
kind: Deployment
metadata:
  name: dormwatch-front
  namespace: dormwatch-front
  labels:
    app: dormwatch-front
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dormwatch-front
  template:
    metadata:
      labels:
        app: dormwatch-front
    spec:
      containers:
        - name: dormwatch-front
          # CI автоматично оновлює цей тег після кожного push
          image: ghcr.io/nulp-ai-enterprise/dormwatch-front-end-v2:sha-4713971
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health
              port: 80
            failureThreshold: 12
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      imagePullSecrets:
        - name: ghcr-secret
